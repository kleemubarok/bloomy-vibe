services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/.wrangler/state:/app/.wrangler/state
    environment:
      - PORT=3000

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_HOST=http://api:3000
